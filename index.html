<html lang="id">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ═══════════════════════════════════════════════
   RZASENSIX — Bio Link | style.css
   Dark Cyber Futuristic Design
═══════════════════════════════════════════════ */

:root {
  --primary: #a61c6c;
  --secondary: #b77eff;
  --accent: #ff3d8b;
  --dark: #030303;
  --dark-alt: #0a0a0a;
  --light: #ffffff;
  --text: #eaeaea;
  --text-dim: #a0a0a0;
  --glass: rgba(12, 8, 16, 0.6);
  --glass-border: rgba(166, 28, 108, 0.2);
  --gradient-1: linear-gradient(135deg, #a61c6c 0%, #b77eff 50%, #ff3d8b 100%);
  --gradient-2: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --shadow-glow: 0 0 40px rgba(166, 28, 108, 0.4);
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

a { text-decoration: none; color: inherit; }

/* ── Background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(166, 28, 108, 0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(183, 126, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse 50% 30% at 10% 80%, rgba(255, 61, 139, 0.08) 0%, transparent 50%),
    var(--dark);
  z-index: 0;
  pointer-events: none;
}

/* ── Grid Overlay ── */
.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(166, 28, 108, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(166, 28, 108, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}

/* ── Scanlines ── */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  z-index: 1;
  pointer-events: none;
  animation: scanMove 8s linear infinite;
}

@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* ── Particle Canvas ── */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ══════════════════════════════════════════════
   LOADER
══════════════════════════════════════════════ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--dark);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

#loader.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-inner {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.loader-logo {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.2em;
  animation: logoPulse 1s ease infinite alternate;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(166, 28, 108, 0.8));
}

@keyframes logoPulse {
  from { filter: drop-shadow(0 0 10px rgba(166, 28, 108, 0.6)); }
  to   { filter: drop-shadow(0 0 30px rgba(255, 61, 139, 1)); }
}

.loader-bar {
  width: 200px;
  height: 3px;
  background: rgba(166, 28, 108, 0.2);
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid rgba(166, 28, 108, 0.3);
}

.loader-fill {
  height: 100%;
  width: 0;
  background: var(--gradient-1);
  border-radius: 2px;
  animation: loadFill 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 10px rgba(255, 61, 139, 0.8);
}

@keyframes loadFill {
  0%   { width: 0; }
  60%  { width: 70%; }
  100% { width: 100%; }
}

.loader-text {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  color: var(--primary);
  animation: blink 0.8s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ══════════════════════════════════════════════
   MAIN CONTAINER
══════════════════════════════════════════════ */
.container {
  position: relative;
  z-index: 2;
  max-width: 480px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.container.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ══════════════════════════════════════════════
   PROFILE SECTION
══════════════════════════════════════════════ */
.profile-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 20px 0 10px;
  position: relative;
}

/* Glow ring behind avatar */
.profile-glow-ring {
  position: absolute;
  top: 10px;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(166, 28, 108, 0.4) 0%, transparent 70%);
  animation: ringPulse 3s ease infinite;
  pointer-events: none;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50%       { transform: scale(1.2); opacity: 0.3; }
}

/* Avatar wrapper */
.profile-avatar-wrap {
  position: relative;
  width: 110px;
  height: 110px;
  margin-bottom: 20px;
  animation: floatAvatar 4s ease-in-out infinite;
}

@keyframes floatAvatar {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}

/* Spinning border */
.avatar-border-spin {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--primary),
    var(--secondary),
    var(--accent),
    var(--primary)
  );
  animation: spinBorder 3s linear infinite;
  z-index: 0;
}

@keyframes spinBorder {
  to { transform: rotate(360deg); }
}

.profile-avatar {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--dark);
  box-shadow: 0 0 30px rgba(166, 28, 108, 0.6), inset 0 0 20px rgba(0,0,0,0.5);
  transition: box-shadow 0.3s ease;
}

.profile-avatar-wrap:hover .profile-avatar {
  box-shadow: 0 0 50px rgba(255, 61, 139, 0.9), inset 0 0 20px rgba(0,0,0,0.5);
}

/* Online status dot */
.avatar-status {
  position: absolute;
  bottom: 6px;
  right: 6px;
  width: 14px;
  height: 14px;
  background: #00ff88;
  border-radius: 50%;
  border: 2px solid var(--dark);
  z-index: 2;
  box-shadow: 0 0 8px #00ff88;
  animation: statusPulse 2s ease infinite;
}

@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 6px #00ff88; }
  50%       { box-shadow: 0 0 16px #00ff88, 0 0 30px rgba(0,255,136,0.4); }
}

/* Name */
.profile-name {
  font-family: var(--font-display);
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  margin-bottom: 8px;
  line-height: 1;
}

.name-glitch {
  position: relative;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255, 61, 139, 0.5));
}

.name-glitch::before,
.name-glitch::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.name-glitch::before {
  animation: glitch1 4s infinite;
  clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
}

.name-glitch::after {
  animation: glitch2 4s infinite;
  clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
}

@keyframes glitch1 {
  0%, 90%, 100% { transform: translate(0); opacity: 0; }
  92%           { transform: translate(-3px, 1px); opacity: 0.8; filter: hue-rotate(90deg); }
  94%           { transform: translate(3px, -1px); opacity: 0.8; }
  96%           { transform: translate(0); opacity: 0; }
}

@keyframes glitch2 {
  0%, 88%, 100% { transform: translate(0); opacity: 0; }
  90%           { transform: translate(3px, -1px); opacity: 0.8; filter: hue-rotate(-90deg); }
  92%           { transform: translate(-3px, 1px); opacity: 0.8; }
  94%           { transform: translate(0); opacity: 0; }
}

/* Bio */
.profile-bio {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}

/* Tags */
.profile-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.tag {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.tag:hover {
  border-color: var(--primary);
  color: var(--accent);
  box-shadow: 0 0 10px rgba(166, 28, 108, 0.3);
}

.tag i { margin-right: 5px; font-size: 0.7rem; }

/* ══════════════════════════════════════════════
   DIVIDER
══════════════════════════════════════════════ */
.section-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
}

.divider-icon {
  color: var(--primary);
  font-size: 0.9rem;
  filter: drop-shadow(0 0 6px var(--primary));
  animation: iconSpin 8s linear infinite;
}

@keyframes iconSpin {
  to { transform: rotate(360deg); }
}

/* ══════════════════════════════════════════════
   LINK CARDS
══════════════════════════════════════════════ */
.links-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.link-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
              border-color 0.3s ease,
              box-shadow 0.3s ease;
  opacity: 0;
  transform: translateX(-30px);
}

.link-card.visible {
  opacity: 1;
  transform: translateX(0);
}

.link-card:hover {
  transform: scale(1.03) translateY(-2px);
  border-color: var(--primary);
  box-shadow: 0 8px 32px rgba(166, 28, 108, 0.35),
              0 0 0 1px rgba(166, 28, 108, 0.15) inset;
}

/* Platform-specific glow colors */
[data-platform="instagram"]:hover { box-shadow: 0 8px 32px rgba(225, 48, 108, 0.4), 0 0 0 1px rgba(225, 48, 108, 0.2) inset; }
[data-platform="whatsapp"]:hover { box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35), 0 0 0 1px rgba(37, 211, 102, 0.15) inset; }
[data-platform="whatsapp-group"]:hover { box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35), 0 0 0 1px rgba(37, 211, 102, 0.15) inset; }
[data-platform="tiktok"]:hover { box-shadow: 0 8px 32px rgba(105, 201, 208, 0.35), 0 0 0 1px rgba(105, 201, 208, 0.15) inset; }

/* Card bg gradient (subtle) */
.card-bg {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: inherit;
}

.link-card:hover .card-bg { opacity: 1; }

[data-platform="instagram"] .card-bg { background: linear-gradient(135deg, rgba(225,48,108,0.08) 0%, rgba(255,120,60,0.05) 100%); }
[data-platform="whatsapp"] .card-bg,
[data-platform="whatsapp-group"] .card-bg { background: linear-gradient(135deg, rgba(37,211,102,0.08) 0%, transparent 100%); }
[data-platform="website"] .card-bg { background: linear-gradient(135deg, rgba(166,28,108,0.12) 0%, rgba(183,126,255,0.08) 100%); }
[data-platform="tiktok"] .card-bg { background: linear-gradient(135deg, rgba(105,201,208,0.08) 0%, rgba(254,44,85,0.06) 100%); }

/* Card glow edge */
.card-glow {
  position: absolute;
  top: 0;
  left: -60%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  transform: skewX(-20deg);
  transition: left 0.5s ease;
  pointer-events: none;
}

.link-card:hover .card-glow { left: 130%; }

/* Shimmer sweep */
.card-shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
  pointer-events: none;
}

.link-card:hover .card-shimmer { transform: translateX(100%); }

/* Icon wrap */
.card-icon-wrap {
  position: relative;
  flex-shrink: 0;
  width: 46px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(166, 28, 108, 0.15);
  border: 1px solid rgba(166, 28, 108, 0.3);
  transition: all 0.3s ease;
  z-index: 1;
}

.link-card:hover .card-icon-wrap {
  background: rgba(166, 28, 108, 0.25);
  border-color: var(--primary);
  box-shadow: 0 0 16px rgba(166, 28, 108, 0.5);
}

.card-icon {
  font-size: 1.4rem;
  color: var(--text);
  transition: color 0.3s ease, transform 0.3s ease;
  z-index: 1;
}

.link-card:hover .card-icon { transform: scale(1.1); }

/* Platform icon colors */
[data-platform="instagram"]:hover .card-icon { color: #e1306c; }
[data-platform="whatsapp"]:hover .card-icon,
[data-platform="whatsapp-group"]:hover .card-icon { color: #25d366; }
[data-platform="website"]:hover .card-icon { color: var(--secondary); }
[data-platform="tiktok"]:hover .card-icon { color: #69c9d0; }

/* Icon badge */
.icon-badge {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 18px;
  height: 18px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: #fff;
  border: 2px solid var(--dark);
  z-index: 2;
}

/* Card text content */
.card-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 1;
}

.card-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
  transition: color 0.3s ease;
}

.link-card:hover .card-title { color: var(--light); }

.card-sub {
  font-family: var(--font-body);
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  font-weight: 400;
}

/* Arrow */
.card-arrow {
  font-size: 0.8rem;
  color: var(--text-dim);
  transition: all 0.3s ease;
  opacity: 0.5;
  z-index: 1;
}

.link-card:hover .card-arrow {
  opacity: 1;
  color: var(--accent);
  transform: translate(2px, -2px);
  filter: drop-shadow(0 0 4px var(--accent));
}

/* ── Featured card ── */
.link-card.featured {
  border-color: rgba(166, 28, 108, 0.5);
  background: rgba(20, 6, 14, 0.7);
}

.link-card.featured::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 14px;
  padding: 1px;
  background: var(--gradient-1);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.6;
  pointer-events: none;
  animation: borderGlow 2s ease infinite alternate;
}

@keyframes borderGlow {
  from { opacity: 0.4; }
  to   { opacity: 0.9; }
}

.featured-badge {
  position: absolute;
  top: -1px;
  right: 16px;
  font-family: var(--font-display);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 10px;
  background: var(--gradient-1);
  color: white;
  border-radius: 0 0 8px 8px;
  z-index: 2;
  box-shadow: 0 4px 12px rgba(255, 61, 139, 0.4);
}

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
.site-footer {
  text-align: center;
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.footer-text {
  font-family: var(--font-body);
  font-size: 0.75rem;
  color: rgba(160, 160, 160, 0.4);
  letter-spacing: 0.1em;
}

.footer-dots {
  display: flex;
  gap: 6px;
}

.footer-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--primary);
  opacity: 0.4;
  animation: dotPulse 1.5s ease infinite;
}

.footer-dots span:nth-child(2) { animation-delay: 0.3s; }
.footer-dots span:nth-child(3) { animation-delay: 0.6s; }

@keyframes dotPulse {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%       { opacity: 0.8; transform: scale(1.3); }
}

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media (max-width: 520px) {
  .container { padding: 30px 16px 50px; }
  .profile-name { font-size: 1.5rem; }
  .link-card { padding: 14px 16px; gap: 12px; }
  .card-icon-wrap { width: 42px; height: 42px; }
  .card-icon { font-size: 1.2rem; }
  .card-title { font-size: 0.82rem; }
}

@media (min-width: 600px) {
  .container { padding: 50px 24px 70px; }
}
  </style>

/* ──────────────────────────────────────────────
   1. LOADING SCREEN
────────────────────────────────────────────── */
function dismissLoader() {
  const loader = document.getElementById('loader');
  const main   = document.getElementById('main-content');
  if (loader.classList.contains('hidden')) return; // already dismissed
  loader.classList.add('hidden');
  main.classList.add('visible');
  animateCards();
}

// Dismiss after bar animation finishes (2.2s) — no matter what
setTimeout(dismissLoader, 2200);

// Also dismiss as soon as DOM + critical resources are ready
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(dismissLoader, 2200);
});

// Hard fallback: force dismiss after 3s max
setTimeout(dismissLoader, 3000);


/* ──────────────────────────────────────────────
   2. CARD STAGGER ANIMATION
────────────────────────────────────────────── */
function animateCards() {
  const cards = document.querySelectorAll('.link-card');
  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add('visible');
    }, 100 + i * 120);
  });
}


/* ──────────────────────────────────────────────
   3. PARTICLE SYSTEM
────────────────────────────────────────────── */
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  let W, H, particles = [];

  const CONFIG = {
    count:         70,
    maxRadius:     2.2,
    minRadius:     0.4,
    speed:         0.35,
    connectionDist: 120,
    colors: ['rgba(166,28,108,', 'rgba(183,126,255,', 'rgba(255,61,139,'],
  };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  class Particle {
    constructor() { this.reset(true); }

    reset(init = false) {
      this.x      = Math.random() * W;
      this.y      = init ? Math.random() * H : H + 10;
      this.r      = CONFIG.minRadius + Math.random() * (CONFIG.maxRadius - CONFIG.minRadius);
      this.vx     = (Math.random() - 0.5) * CONFIG.speed;
      this.vy     = -(Math.random() * CONFIG.speed + 0.1);
      this.alpha  = 0.1 + Math.random() * 0.5;
      this.color  = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
      this.pulse  = Math.random() * Math.PI * 2;
      this.pulseSpeed = 0.02 + Math.random() * 0.02;
    }

    update() {
      this.x    += this.vx;
      this.y    += this.vy;
      this.pulse += this.pulseSpeed;
      const pulsedAlpha = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.color + pulsedAlpha + ')';
      ctx.fill();

      if (this.y < -10 || this.x < -10 || this.x > W + 10) this.reset();
    }
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx   = particles[i].x - particles[j].x;
        const dy   = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONFIG.connectionDist) {
          const alpha = (1 - dist / CONFIG.connectionDist) * 0.15;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(166,28,108,${alpha})`;
          ctx.lineWidth   = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    drawConnections();
    particles.forEach(p => p.update());
    requestAnimationFrame(animate);
  }

  function init() {
    resize();
    particles = Array.from({ length: CONFIG.count }, () => new Particle());
    animate();
  }

  window.addEventListener('resize', () => {
    resize();
    particles = Array.from({ length: CONFIG.count }, () => new Particle());
  });

  init();
})();


/* ──────────────────────────────────────────────
   4. MOUSE PARALLAX ON PROFILE
────────────────────────────────────────────── */
(function initParallax() {
  const profile = document.querySelector('.profile-section');
  if (!profile) return;

  document.addEventListener('mousemove', (e) => {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;

    profile.style.transform = `translate(${dx * 6}px, ${dy * 4}px)`;
  });

  document.addEventListener('mouseleave', () => {
    profile.style.transform = '';
  });
})();


/* ──────────────────────────────────────────────
   5. CARD RIPPLE EFFECT ON CLICK
────────────────────────────────────────────── */
document.querySelectorAll('.link-card').forEach(card => {
  card.addEventListener('click', function (e) {
    const ripple  = document.createElement('span');
    const rect    = this.getBoundingClientRect();
    const size    = Math.max(rect.width, rect.height);
    const x       = e.clientX - rect.left - size / 2;
    const y       = e.clientY - rect.top  - size / 2;

    Object.assign(ripple.style, {
      position:     'absolute',
      width:        size + 'px',
      height:       size + 'px',
      left:         x + 'px',
      top:          y + 'px',
      borderRadius: '50%',
      background:   'rgba(255,61,139,0.2)',
      transform:    'scale(0)',
      animation:    'rippleAnim 0.6s ease-out forwards',
      pointerEvents: 'none',
      zIndex:       '10',
    });

    // Inject ripple keyframes once
    if (!document.getElementById('ripple-style')) {
      const style = document.createElement('style');
      style.id = 'ripple-style';
      style.textContent = `
        @keyframes rippleAnim {
          to { transform: scale(2.5); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});


/* ──────────────────────────────────────────────
   6. GLITCH EFFECT TRIGGER (random)
────────────────────────────────────────────── */
(function glitchTrigger() {
  const name = document.querySelector('.profile-name');
  if (!name) return;

  setInterval(() => {
    name.classList.add('glitch-active');
    setTimeout(() => name.classList.remove('glitch-active'), 400);

})();


/* ──────────────────────────────────────────────
   7. SMOOTH SCROLL (polyfill for older Safari)
────────────────────────────────────────────── */
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});
